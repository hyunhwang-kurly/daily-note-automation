<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Open in Obsidian — RON</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7; color: #1a1a1a;
    }
    .card {
      max-width: 440px; width: calc(100% - 32px);
      background: #fff; border-radius: 16px; padding: 28px 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08); text-align: center;
    }
    h1 { font-size: 18px; margin: 0 0 6px; }
    p { font-size: 14px; color: #666; margin: 0 0 18px; line-height: 1.55; }
    .btn {
      display: inline-block; padding: 13px 26px; border-radius: 10px;
      background: #5b4bff; color: #fff; font-weight: 700; font-size: 15px;
      text-decoration: none; border: none; cursor: pointer;
    }
    .btn.secondary {
      background: transparent; color: #5b4bff; border: 1px solid #d9d6ff;
      font-size: 13px; padding: 9px 16px; margin-top: 10px;
    }
    .uri {
      font-size: 12px; color: #999; margin-top: 16px; word-break: break-all;
      user-select: all;
    }
    .foot { font-size: 11px; color: #c0c0c0; margin-top: 22px; }
    .foot a { color: #b0b0b0; }
    @media (prefers-color-scheme: dark) {
      body { background: #16171a; color: #eee; }
      .card { background: #222428; box-shadow: none; }
      p { color: #aaa; }
      .btn.secondary { border-color: #3a3960; }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>📓 Obsidian에서 노트 여는 중…</h1>
    <p>자동으로 열리지 않으면 아래 버튼을 눌러주세요.<br />처음이라면 브라우저가 "Obsidian 열기" 허용을 물어볼 수 있어요.</p>
    <a id="open" class="btn" href="#">Obsidian에서 열기 →</a>
    <button id="copy" class="btn secondary" type="button" hidden>링크 복사</button>
    <div class="uri" id="uri"></div>
    <div class="foot">
      자동 생성 — <a href="https://github.com/hyunhwang-kurly/daily-note-automation" target="_blank" rel="noopener">RON · Routine On</a>
    </div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var vault = params.get("vault") || "";
      var file = params.get("file") || "";
      var card = document.getElementById("card");

      // 파라미터가 없으면 범용 안내 화면 (어떤 사용자가 직접 방문해도 의미 있게)
      if (!vault && !file) {
        card.innerHTML =
          '<h1>📓 Open in Obsidian</h1>' +
          '<p>이 페이지는 메일·링크의 <code>?vault=&amp;file=</code> 정보를 받아 ' +
          'Obsidian으로 넘겨주는 리다이렉트 페이지입니다.<br />열 노트 정보가 없어 표시할 내용이 없습니다.</p>' +
          '<div class="foot"><a href="https://github.com/hyunhwang-kurly/daily-note-automation" target="_blank" rel="noopener">RON · Routine On</a></div>';
        return;
      }

      // URLSearchParams가 한 번 디코드한 값을 Obsidian 권장 방식으로 다시 인코드
      var uri = "obsidian://open?vault=" + encodeURIComponent(vault) +
                "&file=" + encodeURIComponent(file);

      var a = document.getElementById("open");
      a.href = uri;
      document.getElementById("uri").textContent = uri;

      // 클립보드 지원 시 "링크 복사" 폴백 노출
      var copyBtn = document.getElementById("copy");
      if (navigator.clipboard && window.isSecureContext) {
        copyBtn.hidden = false;
        copyBtn.addEventListener("click", function () {
          navigator.clipboard.writeText(uri).then(function () {
            copyBtn.textContent = "복사됨 ✓";
            setTimeout(function () { copyBtn.textContent = "링크 복사"; }, 1500);
          });
        });
      }

      // 자동 리다이렉트 (사용자 제스처 없이도 시도; 차단되면 버튼 사용)
      try { location.replace(uri); } catch (e) { /* noop */ }
    })();
  </script>
</body>
</html>
